services:
  app:
    image: ghcr.io/oxon1um/melodarr:latest
    restart: unless-stopped
    ports:
      - "30000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-melodarr}:${POSTGRES_PASSWORD:-melodarr}@db:5432/${POSTGRES_DB:-melodarr}?schema=public
      REDIS_URL: redis://redis:6379
      # Generate a new secret with: openssl rand -hex 64
      SESSION_SECRET: ${SESSION_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-melodarr}
      POSTGRES_USER: ${POSTGRES_USER:-melodarr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-melodarr}
    volumes:
      - melodarr_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-melodarr} -d ${POSTGRES_DB:-melodarr}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: always
    volumes:
      - melodarr_redis:/data

volumes:
  melodarr_postgres:
  melodarr_redis:
