services:
  app:
    image: ghcr.io/oxon1um/melodarr:latest
    ports:
      - "30000:3000"
    environment:
      DATABASE_URL: postgresql://melodarr:melodarr@db:5432/melodarr?schema=public
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: melodarr
      POSTGRES_USER: melodarr
      POSTGRES_PASSWORD: melodarr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melodarr -d melodarr"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped

volumes:
  pgdata:
