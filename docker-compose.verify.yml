services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: melodarr
      POSTGRES_USER: melodarr
      POSTGRES_PASSWORD: melodarr
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melodarr -d melodarr"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
